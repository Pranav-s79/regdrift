name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    name: py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Cache SVD corpus
        uses: actions/cache@v4
        with:
          path: tests/corpus
          key: svd-corpus-${{ hashFiles('scripts/fetch_corpus.py') }}

      - name: Fetch SVD corpus
        run: python scripts/fetch_corpus.py

      - name: Lint
        run: ruff check .

      - name: Typecheck
        run: mypy

      - name: Test
        run: pytest
