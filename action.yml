name: "regdrift check"
description: "Fail pull requests that break a CMSIS-SVD register map. Diffs the PR's SVD against the base ref and classifies every change against a published rulebook."
branding:
  icon: "cpu"
  color: "red"
inputs:
  svd-path:
    description: "Path to the .svd file in this repository"
    required: true
  base-ref:
    description: "Git ref to diff against (default: the PR base branch, else origin/main)"
    default: ""
  fail-on:
    description: "breaking | warning"
    default: "breaking"
  config:
    description: "Path to a .regdrift.toml (optional)"
    default: ""
  comment:
    description: "Post/update a sticky PR comment (true|false)"
    default: "true"
  version:
    description: "regdrift version to install from PyPI; 'source' installs this checkout"
    default: ""
runs:
  using: "composite"
  steps:
    - name: Install regdrift
      shell: bash
      run: |
        if [ "${{ inputs.version }}" = "source" ]; then pip install "${{ github.action_path }}";
        elif [ -n "${{ inputs.version }}" ]; then pip install "regdrift==${{ inputs.version }}";
        else pip install regdrift; fi
    - name: Extract base SVD
      id: base
      shell: bash
      run: |
        REF="${{ inputs.base-ref }}"
        if [ -z "$REF" ] && [ -n "${{ github.base_ref }}" ]; then REF="origin/${{ github.base_ref }}"; fi
        if [ -z "$REF" ]; then REF="origin/main"; fi
        if git show "$REF:${{ inputs.svd-path }}" > "$RUNNER_TEMP/base.svd" 2>/dev/null; then
          echo "found=true" >> "$GITHUB_OUTPUT"
        else
          echo "::notice::${{ inputs.svd-path }} does not exist at $REF - nothing to compare"
          echo "found=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Run regdrift check
      id: check
      if: steps.base.outputs.found == 'true'
      shell: bash
      run: |
        set +e
        ARGS=("$RUNNER_TEMP/base.svd" "${{ inputs.svd-path }}" --fail-on "${{ inputs.fail-on }}")
        if [ -n "${{ inputs.config }}" ]; then ARGS+=(--config "${{ inputs.config }}"); fi
        regdrift check "${ARGS[@]}" --format github
        CODE=$?
        regdrift check "${ARGS[@]}" --format json > "$RUNNER_TEMP/regdrift.json" || true
        { echo '## regdrift report'; echo '```'; regdrift check "${ARGS[@]}" || true; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
        echo "code=$CODE" >> "$GITHUB_OUTPUT"
    - name: Sticky PR comment
      if: github.event_name == 'pull_request' && inputs.comment == 'true' && steps.base.outputs.found == 'true'
      continue-on-error: true
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const marker = '<!-- regdrift-report -->';
          const r = JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/regdrift.json', 'utf8'));
          const s = r.summary;
          const verdict = r.passed ? 'PASSED' : 'FAILED';
          const body = [marker,
            `### regdrift: register-map check ${verdict}`,
            '', '| Severity | Count |', '| --- | --- |',
            `| BREAKING | ${s.breaking} |`, `| WARNING | ${s.warning} |`,
            `| SAFE | ${s.safe} |`, `| ALLOWED | ${s.allowed} |`,
            '', `Rulebook: [RULES.md](https://github.com/Pranav-s79/regdrift/blob/main/RULES.md)`].join('\n');
          const {data: comments} = await github.rest.issues.listComments({
            ...context.repo, issue_number: context.issue.number, per_page: 100});
          const mine = comments.find(c => c.body && c.body.startsWith(marker));
          if (mine) { await github.rest.issues.updateComment({...context.repo, comment_id: mine.id, body}); }
          else { await github.rest.issues.createComment({...context.repo, issue_number: context.issue.number, body}); }
    - name: Enforce verdict
      if: steps.base.outputs.found == 'true'
      shell: bash
      run: exit "${{ steps.check.outputs.code }}"
