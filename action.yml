name: "regdrift check"
description: "Detect breaking CMSIS-SVD register-map changes in pull requests."
branding:
  icon: "cpu"
  color: "red"
inputs:
  svd-path:
    description: "Path to the .svd file in this repository"
    required: true
  base-ref:
    description: "Git ref to diff against (default: the PR base branch, else origin/main)"
    default: ""
  fail-on:
    description: "breaking | warning"
    default: "breaking"
  config:
    description: "Path to a .regdrift.toml (optional)"
    default: ""
  comment:
    description: "Post/update a sticky PR comment (true|false)"
    default: "true"
  version:
    description: "'source' installs this action checkout (default); otherwise install an exact PyPI version"
    default: "source"
runs:
  using: "composite"
  steps:
    - name: Install regdrift
      shell: bash
      env:
        REGDRIFT_VERSION: ${{ inputs.version }}
      run: |
        if [ "$REGDRIFT_VERSION" = "source" ]; then pip install "$GITHUB_ACTION_PATH";
        elif [ -n "$REGDRIFT_VERSION" ]; then pip install "regdrift==$REGDRIFT_VERSION";
        else pip install regdrift; fi
    - name: Extract base SVD
      id: base
      shell: bash
      env:
        REGDRIFT_BASE_REF: ${{ inputs.base-ref }}
        REGDRIFT_EVENT_BASE_REF: ${{ github.base_ref }}
        REGDRIFT_SVD_PATH: ${{ inputs.svd-path }}
      run: |
        REF="$REGDRIFT_BASE_REF"
        if [ -z "$REF" ] && [ -n "$REGDRIFT_EVENT_BASE_REF" ]; then REF="origin/$REGDRIFT_EVENT_BASE_REF"; fi
        if [ -z "$REF" ]; then REF="origin/main"; fi
        # An unresolvable ref is a workflow error, never a clean pass: it usually
        # means a shallow checkout (missing fetch-depth: 0) or a mistyped base-ref.
        if ! git rev-parse --verify --quiet --end-of-options "${REF}^{commit}" > /dev/null; then
          echo "::error::The base ref cannot be resolved to a commit - check out full history (fetch-depth: 0) or set the base-ref input to an existing ref"
          echo "unresolvable base ref: $REF" >&2
          exit 1
        fi
        if git show "${REF}:${REGDRIFT_SVD_PATH}" > "$RUNNER_TEMP/base.svd" 2>/dev/null; then
          echo "found=true" >> "$GITHUB_OUTPUT"
        else
          echo "::notice::Configured SVD path does not exist at the base ref - nothing to compare (newly introduced file)"
          echo "found=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Run regdrift check
      id: check
      if: steps.base.outputs.found == 'true'
      shell: bash
      env:
        REGDRIFT_CONFIG: ${{ inputs.config }}
        REGDRIFT_FAIL_ON: ${{ inputs.fail-on }}
        REGDRIFT_SVD_PATH: ${{ inputs.svd-path }}
      run: |
        set +e
        ARGS=("$RUNNER_TEMP/base.svd" "$REGDRIFT_SVD_PATH" --fail-on "$REGDRIFT_FAIL_ON")
        if [ -n "$REGDRIFT_CONFIG" ]; then ARGS+=(--config "$REGDRIFT_CONFIG"); fi
        regdrift check "${ARGS[@]}" --format github
        CODE=$?
        regdrift check "${ARGS[@]}" --format json > "$RUNNER_TEMP/regdrift.json" || true
        { echo '## regdrift report'; echo '```'; regdrift check "${ARGS[@]}" || true; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
        echo "code=$CODE" >> "$GITHUB_OUTPUT"
    - name: Sticky PR comment
      if: github.event_name == 'pull_request' && inputs.comment == 'true' && steps.base.outputs.found == 'true'
      continue-on-error: true
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const marker = '<!-- regdrift-report -->';
          const r = JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/regdrift.json', 'utf8'));
          const s = r.summary;
          const verdict = r.passed ? 'PASSED' : 'FAILED';
          const body = [marker,
            `### regdrift: register-map check ${verdict}`,
            '', '| Severity | Count |', '| --- | --- |',
            `| BREAKING | ${s.breaking} |`, `| WARNING | ${s.warning} |`,
            `| SAFE | ${s.safe} |`, `| ALLOWED | ${s.allowed} |`,
            '', `Rulebook: [RULES.md](https://github.com/Pranav-s79/regdrift/blob/main/RULES.md)`].join('\n');
          const {data: comments} = await github.rest.issues.listComments({
            ...context.repo, issue_number: context.issue.number, per_page: 100});
          const mine = comments.find(c => c.body && c.body.startsWith(marker));
          if (mine) { await github.rest.issues.updateComment({...context.repo, comment_id: mine.id, body}); }
          else { await github.rest.issues.createComment({...context.repo, issue_number: context.issue.number, body}); }
    - name: Enforce verdict
      if: steps.base.outputs.found == 'true'
      shell: bash
      env:
        REGDRIFT_EXIT_CODE: ${{ steps.check.outputs.code }}
      run: exit "$REGDRIFT_EXIT_CODE"
